name: Frontend CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags:
      - "front-v*"
  workflow_dispatch:

jobs:
  ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static entry files
        shell: bash
        run: |
          test -f index.html
          test -f src/app.js

  deploy:
    name: Frontend Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/front-v')

    steps:
      - name: Trigger frontend deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${DEPLOY_HOOK_URL}" ]; then
            echo "Missing FRONTEND_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsS -X POST "${DEPLOY_HOOK_URL}"
